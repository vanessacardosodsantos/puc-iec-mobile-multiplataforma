name: Grade — Atividade 2 (App RN)

# Roda em PR de FORK a cada commit (pull_request_target → tem permissão de comentar
# e dispara sem aprovação manual). Descobre a pasta da entrega em QUALQUER path.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'exercicios/02-app-rn-navegacao-estado/**'

permissions:
  pull-requests: write
  contents: read

env:
  EXERCISE: exercicios/02-app-rn-navegacao-estado
  VALIDATOR: rn-app.ts
  ATIVIDADE: 'Atividade 2 — App RN: Favoritos + MMKV + Reanimated'

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 1) Base (main): o grader CONFIÁVEL do prof. NUNCA rodamos código do fork.
      - uses: actions/checkout@v4

      # 2) HEAD do PR isolado em _pr/: a entrega do aluno (não-confiável). O validator
      #    só LÊ estaticamente esses arquivos — nada de instalar/executar a entrega.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: _pr

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - working-directory: ./grader
        run: npm ci || npm install

      # Descobre a pasta da entrega a PARTIR dos arquivos que o PR mudou — funciona em
      # aluno-<login>/, <nome>/, starter/ editado in-place, app aninhado, etc.
      - id: discover
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('node:path');
            const EX = process.env.EXERCISE;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number, per_page: 100,
            });
            const changed = files.map(f => f.filename)
              .filter(f => f.startsWith(EX + '/') && !f.includes('/node_modules/'));
            const dirOf = f => path.posix.dirname(f);
            let entrega =
              // 1) pasta do package.json mudado (acha app aninhado)
              changed.filter(f => f.endsWith('/package.json')).map(dirOf)[0];
            if (!entrega) {
              // 2) subpasta de 1º nível sob o exercício com mais arquivos mudados
              const counts = {};
              for (const f of changed) {
                const rest = f.slice(EX.length + 1);
                if (rest.includes('/')) {
                  const top = rest.split('/')[0];
                  counts[top] = (counts[top] || 0) + 1;
                }
              }
              const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0]?.[0];
              if (top) entrega = `${EX}/${top}`;
            }
            // 3) fallback final: edição in-place na raiz do exercício
            if (!entrega) entrega = EX;
            core.setOutput('entrega', entrega);
            core.setOutput('found', changed.length ? 'yes' : 'no');
            core.info(`Entrega descoberta: ${entrega} (${changed.length} arquivos mudados sob o exercício)`);

      - name: Rodar validator
        working-directory: ./grader
        run: |
          npx tsx "lib/validators/${VALIDATOR}" \
            --entrega "../_pr/${{ steps.discover.outputs.entrega }}" \
            --output /tmp/grade.json \
            --student-login "${{ github.event.pull_request.user.login }}" \
            --commit-sha "${{ github.event.pull_request.head.sha }}" || true

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grade-${{ github.event.pull_request.user.login }}
          path: /tmp/grade.json
          retention-days: 30
          if-no-files-found: warn

      - name: Comentar no PR (nota mínima + porquê)
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const ATIV = process.env.ATIVIDADE;
            const head = `## 🤖 J.A.R.V.I.S. — *autograder do Prof. Jackson*\n\n` +
              `> *Just A Rather Very Intelligent System* — roda as regras de avaliação automatizada nos PRs.\n\n` +
              `**${ATIV}**\n\n`;
            if (!fs.existsSync('/tmp/grade.json')) {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number,
                body: head + `❌ Não consegui avaliar sua entrega. Confira se o app (com \`package.json\`) está dentro de \`${process.env.EXERCISE}/\`.`,
              });
              return;
            }
            const g = JSON.parse(fs.readFileSync('/tmp/grade.json', 'utf8'));
            const fmt = (n) => String(n).replace('.', ',');
            const manual = g.manualTotal ?? 0;
            const body = head +
              `### ⚠️ Nota MÍNIMA automática: **${fmt(g.score)} / ${g.total}**\n` +
              `É um **piso**: a nota final (lançada por mim no **Canvas**) parte daqui e **só sobe** com a revisão manual.\n\n` +
              `${g.publicBreakdown}\n\n` +
              (manual > 0
                ? `📝 Os itens _avaliação manual_ valem **+${manual} pts** e são conferidos no Canvas (README/screenshot/screencast, referência).\n\n`
                : ``) +
              (g.pass
                ? `✅ Critérios automáticos mínimos atendidos.\n\n`
                : `⚠️ Abaixo do mínimo automático — revise os ❌ acima e faça um novo commit (eu re-avalio).\n\n`) +
              `🎥 Anexe um **screencast (≤ 2min)** do app rodando na descrição do PR.\n` +
              `_Dúvidas? **Teams da turma** ou jackson.96@gmail.com._`;
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body,
            });

      - name: Status check (piso automático)
        if: always()
        run: |
          if [ -f /tmp/grade.json ]; then
            PASS=$(node -e "process.stdout.write(String(require('/tmp/grade.json').pass))")
            [ "$PASS" = "true" ] && exit 0 || exit 1
          else
            exit 1
          fi
